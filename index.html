<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>APK Downloader</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 100px;
    }
    input {
      width: 400px;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-right: 10px;
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #16a34a;
    }
    .links {
      margin-top: 30px;
    }
    a {
      display: block;
      margin: 10px;
      color: #38bdf8;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <h1>📲 APK Downloader Tool</h1>

  <input id="url" placeholder="Paste Play Store link here">
  <button onclick="process()">Get APK</button>

  <div class="links" id="output"></div>

  <script>
    function extractPackage(url) {
      const match = url.match(/id=([a-zA-Z0-9._]+)/);
      return match ? match[1] : null;
    }

    function process() {
      const url = document.getElementById("url").value;
      const pkg = extractPackage(url);

      if (!pkg) {
        alert("Invalid Play Store URL");
        return;
      }

      const output = document.getElementById("output");

      output.innerHTML = `
        <h3>Package: ${pkg}</h3>

        <a href="https://apkpure.com/search?q=${pkg}" target="_blank">
          Download via APKPure
        </a>

        <a href="https://www.apkmirror.com/?post_type=app_release&searchtype=apk&s=${pkg}" target="_blank">
          Download via APKMirror
        </a>

        <a href="https://play.google.com/store/apps/details?id=${pkg}" target="_blank">
          Open in Play Store
        </a>
      `;
    }
  </script>

</body>
</html>
